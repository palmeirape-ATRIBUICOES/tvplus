<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:#0b0b0b; color:#fff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
    .playerBox { position: relative; border-radius: 14px; overflow: hidden; background:#000; }
    video { width: 100%; height: auto; display:block; background:#000; }

    .topBar { display:flex; gap:10px; flex-wrap: wrap; align-items:center; margin-bottom: 12px; }
    input {
      flex: 1 1 420px;
      min-width: 240px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #111;
      color:#fff;
      outline:none;
    }
    button{
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background:#ffffff;
      color:#000;
      cursor:pointer;
      font-weight: 700;
    }
    button.secondary{
      background:#1f1f1f;
      color:#fff;
      border:1px solid #2a2a2a;
    }

    .status { margin-top:10px; opacity:.85; font-size: 14px; }

    /* Overlay CTA */
    .ctaOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(3px);
      padding: 18px;
    }
    .ctaCard{
      width: min(520px, 95%);
      background: rgba(12,12,12,.92);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 18px;
      text-align:center;
      box-shadow: 0 20px 80px rgba(0,0,0,.6);
    }
    .ctaTitle{ font-size: 18px; margin: 0 0 10px; font-weight: 800; }
    .ctaText{ margin: 0 0 14px; opacity:.9; }
    .ctaBtn{
      display:inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      background:#fff;
      color:#000;
      font-weight: 900;
      text-decoration:none;
    }
    .ctaSmall{
      margin-top: 10px;
      font-size: 12px;
      opacity:.75;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 12px;">Player</h2>

    <div class="topBar">
      <input id="streamUrl" placeholder="Cole a URL .m3u8 aqui" />
      <button id="btnPlay">Play</button>
      <button id="btnStop" class="secondary">Stop</button>
    </div>

    <div class="playerBox">
      <video id="video" controls playsinline></video>

      <!-- Overlay que aparece após 40s -->
      <div id="ctaOverlay" class="ctaOverlay">
        <div class="ctaCard">
          <p class="ctaTitle">Para continuar assistindo, clique aqui:</p>
          <p class="ctaText">Você será direcionado para a página de acesso.</p>
          <a id="ctaLink" class="ctaBtn" href="#" rel="noopener">Continuar</a>
          <div class="ctaSmall">Dica: você pode personalizar esse texto e o link.</div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    // ====== CONFIG ======
    const SALES_URL = "SUA_URL_DA_PAGINA_DE_VENDAS_AQUI"; // <-- troque aqui
    const DEFAULT_STREAM = "SUA_URL_DO_STREAM_M3U8_AQUI"; // <-- opcional: deixe vazio "" se não quiser

    // Tempo até mostrar a mensagem (40s)
    const GATE_SECONDS = 40;

    // ====== ELEMENTOS ======
    const video = document.getElementById("video");
    const input = document.getElementById("streamUrl");
    const statusEl = document.getElementById("status");
    const btnPlay = document.getElementById("btnPlay");
    const btnStop = document.getElementById("btnStop");
    const ctaOverlay = document.getElementById("ctaOverlay");
    const ctaLink = document.getElementById("ctaLink");

    ctaLink.href = SALES_URL;

    let hls = null;
    let gateTimer = null;
    let gateShown = false;

    function setStatus(msg) { statusEl.textContent = msg; }

    function hideGate() {
      ctaOverlay.style.display = "none";
      gateShown = false;
    }

    function showGate() {
      if (gateShown) return;
      gateShown = true;

      // opcional: pausa o vídeo quando o gate aparece
      try { video.pause(); } catch(e) {}

      ctaOverlay.style.display = "flex";
      setStatus("Gate exibido: aguardando clique para continuar.");
    }

    function clearGateTimer(){
      if (gateTimer) {
        clearTimeout(gateTimer);
        gateTimer = null;
      }
    }

    function startGateTimer(){
      clearGateTimer();
      hideGate();
      gateTimer = setTimeout(showGate, GATE_SECONDS * 1000);
    }

    function stopPlayer(){
      clearGateTimer();
      hideGate();

      if (hls) { hls.destroy(); hls = null; }
      video.pause();
      video.removeAttribute("src");
      video.load();
      setStatus("Parado.");
    }

    function playStream(url){
      stopPlayer();
      if (!url) {
        setStatus("Cole uma URL .m3u8 no campo.");
        return;
      }

      setStatus("Carregando stream...");

      // Sempre que der play, inicia contagem de 40s
      // (se o usuário pausar e der play de novo, reinicia)
      const onPlay = () => startGateTimer();
      video.addEventListener("play", onPlay, { once: true });

      // Safari/iOS pode tocar HLS nativo
      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.play()
          .then(() => setStatus("Rodando (HLS nativo)."))
          .catch(e => setStatus("Erro ao dar play: " + e.message));
        return;
      }

      // Demais navegadores: hls.js
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ lowLatencyMode: true });
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play()
            .then(() => setStatus("Rodando."))
            .catch(e => setStatus("Erro ao dar play: " + e.message));
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          setStatus("Erro do player: " + (data?.details || "desconhecido"));
        });
      } else {
        setStatus("Seu navegador não suporta HLS.");
      }
    }

    // Botões
    btnPlay.addEventListener("click", () => {
      const url = (input.value || "").trim();
      playStream(url);
    });

    btnStop.addEventListener("click", stopPlayer);

    // Clique no overlay -> redireciona
    ctaLink.addEventListener("click", (e) => {
      // deixa o link funcionar normalmente
      // (se quiser redirecionar em nova aba, descomente abaixo e comente a linha padrão)
      // e.preventDefault(); window.open(SALES_URL, "_blank", "noopener");
    });

    // Preenche default se quiser
    if (DEFAULT_STREAM && DEFAULT_STREAM !== "SUA_URL_DO_STREAM_M3U8_AQUI") {
      input.value = DEFAULT_STREAM;
    }
  </script>
</body>
</html>
